name: Release Carton
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sync version from tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg ver "$VERSION" '.version = $ver' package.json > package_tmp.json
          mv package_tmp.json package.json
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" carton/__init__.py

      - name: Build installers
        run: python scripts/build_installer.py --version "${{ steps.version.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carton-installer
          path: dist/install_carton_*.py

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/install_carton_*.py
          generate_release_notes: true
