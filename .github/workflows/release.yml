name: Release Carton
on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Sync version from tag
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          jq --arg ver "$VERSION" '.version = $ver' package.json > package_tmp.json
          mv package_tmp.json package.json
          sed -i "s/__version__ = \".*\"/__version__ = \"$VERSION\"/" carton/__init__.py

      - name: Build installers
        run: python scripts/build_installer.py --version "${{ steps.version.outputs.VERSION }}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: carton-release
          path: |
            dist/install_carton_*.py
            dist/carton-v*.zip

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.VERSION }}" \
            --generate-notes \
            dist/install_carton_*.py \
            dist/carton-v*.zip
